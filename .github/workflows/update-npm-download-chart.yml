name: update-npm-download-chart

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: update-npm-download-chart
  cancel-in-progress: false

jobs:
  update-chart:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Generate npm downloads chart
        run: python3 .github/scripts/update_npm_download_chart.py
      - name: Commit chart update
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/npm-weekly-downloads.svg; then
            echo "No chart changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/npm-weekly-downloads.svg
          git commit -m "Update npm download chart"
          git push
